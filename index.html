<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>KARBØN X GAIA ENTERTAINMENT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', 'Noto Sans TC', sans-serif; background-color: #ffffff; }
        #carousel-img { transition: opacity 1s cubic-bezier(0.4, 0, 0.2, 1); will-change: opacity; transform: translateZ(0); }
        .text-shadow-sm { text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
        .animate-fadeIn { animation: fadeIn 0.8s ease-out forwards; opacity: 0; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        html { scroll-behavior: smooth; }
        .lang-select { -webkit-appearance: none; -moz-appearance: none; appearance: none; }
    </style>
</head>
<body class="bg-white text-gray-900 overflow-x-hidden">

    <header class="fixed w-full top-0 bg-white/90 backdrop-blur-md z-[100] border-b border-gray-100 px-8 py-5">
        <nav class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="text-xl font-black tracking-tighter italic text-black uppercase">KARBØN X GAIA</div>
            <div class="flex items-center gap-6 md:gap-8 text-[11px] font-bold tracking-widest text-gray-500">
                <a href="#talents" class="hover:text-black transition-colors uppercase">藝人陣容</a>
                <a href="#host" class="hover:text-black transition-colors uppercase">主持人</a>
                <a href="#founder" class="hover:text-black transition-colors uppercase">創辦人</a>
                <a href="#vision" class="hover:text-black transition-colors uppercase">理念</a>
                <a href="#contact" class="hover:text-black transition-colors uppercase">聯絡我們</a>
            </div>
        </nav>
    </header>

    <section class="mt-20 relative w-full h-[85vh] bg-black overflow-hidden flex flex-col items-center justify-end pb-12">
        <div class="absolute inset-0 flex items-start justify-center">
            <img id="carousel-img" src="images/luyanganhero-banner.jpg" class="w-full h-full object-cover object-top opacity-100 z-10" alt="Artist">
            <div class="absolute inset-x-0 bottom-0 h-64 bg-gradient-to-t from-black to-transparent z-20"></div>
        </div>
        <div class="relative z-30 text-center">
            <h2 id="artist-tag" class="text-white/60 text-[10px] tracking-[0.8em] font-light mb-2 uppercase">FEATURED ARTIST</h2>
            <h1 id="artist-name" class="text-white text-4xl md:text-6xl font-black tracking-[0.2em] uppercase italic text-shadow-sm">劉揚安</h1>
            <div class="w-12 h-[1px] bg-white/40 mx-auto mt-6"></div>
        </div>
    </section>

    <section id="talents" class="max-w-7xl mx-auto px-6 py-32">
        <div class="mb-16 text-center lg:text-left">
            <h2 class="text-5xl font-black tracking-tighter italic text-black uppercase">藝人陣容</h2>
        </div>
        <div id="talents-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-x-12 gap-y-24">
            </div>
    </section>

    <section id="host" class="max-w-7xl mx-auto px-6 py-32 border-t border-gray-50">
        <div class="flex flex-col md:flex-row-reverse gap-16 items-center">
            <div class="w-full md:w-1/2">
                <h2 class="text-6xl font-black italic tracking-tighter mb-8 uppercase text-black text-center md:text-left">劉揚安 LUYANGAN</h2>
                <p class="text-gray-500 leading-relaxed mb-10 text-lg font-light italic text-center md:text-left">"Bridging the gap between the virtual and reality."</p>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <a href="#" class="group flex flex-col p-6 bg-gray-50 hover:bg-black transition-all">
                        <span class="text-xl font-black group-hover:text-white italic">PODCAST CHANNEL</span>
                    </a>
                    <a href="#" class="group flex flex-col p-6 bg-gray-50 hover:bg-black transition-all">
                        <span class="text-xl font-black group-hover:text-white italic">YOUTUBE SHOW</span>
                    </a>
                </div>
            </div>
            <div class="w-full md:w-1/2 aspect-square bg-gray-50 overflow-hidden">
                <img src="talents/luyangan.webp" class="w-full h-full object-cover transition duration-700" onerror="this.src='https://via.placeholder.com/1020x1020?text=LUYANGAN'">
            </div>
        </div>
    </section>

    <section id="founder" class="bg-black text-white py-32 px-8">
        <div class="max-w-7xl mx-auto text-center">
            <h3 class="text-5xl font-black italic tracking-tighter mb-8 uppercase text-white">創辦人 KAYON</h3>
            <p class="text-gray-400 leading-relaxed mb-8 max-w-2xl mx-auto">創辦人 KAYON 將音樂製作的直覺與 AI 前瞻技術融合。致力於建構一個讓虛擬與真實藝人共榮的全新娛樂宇宙，把故事變成歌。</p>
        </div>
    </section>

    <footer id="contact" class="bg-gray-50 py-24 border-t border-gray-100 px-6 text-center">
        <h3 class="text-3xl font-black italic mb-6 uppercase tracking-tighter underline">聯絡我們</h3>
        <p class="text-gray-500 text-sm font-bold uppercase tracking-widest mb-10">Manager: AVA</p>
        <a href="mailto:contact@kayonstudio.com" class="inline-block bg-black text-white px-12 py-5 font-black italic text-lg hover:bg-gray-800 transition-all uppercase">合作洽談</a>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // 藝人資料 (指向 talents/ 資料夾)
            const talentsData = [
                { name: "NØVEX", cat: "FOUNDING GROUP", img: "talents/novex.webp" },
                { name: "NÄXER", cat: "FOUNDING GROUP", img: "talents/naxer.webp" },
                { name: "LILITHIUM", cat: "ARTIST GROUP", img: "talents/lilithium.webp" },
                { name: "VRAISY", cat: "ARTIST GROUP", img: "talents/vraisy.webp" },
                { name: "RÆNE", cat: "VIRTUAL IDOL", img: "talents/raene.webp" },
                { name: "EUNA", cat: "SOLO ARTIST", img: "talents/euna.webp" },
                { name: "JOAH", cat: "SOLO ARTIST", img: "talents/joah.webp" },
                { name: "RAUN", cat: "VIRTUAL IDOL", img: "talents/raun.webp" },
                { name: "GAIALYRA", cat: "EXPERIMENTAL IP", img: "talents/gaialyra.webp" }
            ];

            const grid = document.getElementById('talents-grid');
            if(grid) {
                talentsData.forEach((talent, index) => {
                    grid.innerHTML += `
                        <div class="group animate-fadeIn" style="animation-delay: ${index * 100}ms">
                            <div class="aspect-square bg-gray-50 overflow-hidden mb-6 relative">
                                <img src="${talent.img}" class="w-full h-full object-cover transition duration-700 group-hover:scale-105" onerror="this.src='https://via.placeholder.com/1020x1020?text=${talent.name}'">
                            </div>
                            <h3 class="text-2xl font-black italic tracking-tighter uppercase text-black">${talent.name}</h3>
                            <p class="text-[10px] font-bold text-gray-400 mt-1 uppercase">${talent.cat}</p>
                        </div>`;
                });
            }

            // Banner 輪播 (指向 images/ 資料夾)
            const bannerArtists = [
                { name: "劉揚安", img: "images/luyanganhero-banner.jpg" },
                { name: "NØVEX", img: "images/novexhero-banner.jpg" },
                { name: "NÄXER", img: "images/naxerhero-banner.jpg" },
                { name: "EUNA", img: "images/eunahero-banner.jpg" },
                { name: "JOAH", img: "images/joahhero-banner.jpg" }
            ];
            
            let currentIndex = 0;
            const imgElement = document.getElementById('carousel-img');
            const nameElement = document.getElementById('artist-name');

            function nextSlide() {
                if(!imgElement) return;
                imgElement.style.opacity = '0';
                setTimeout(() => {
                    currentIndex = (currentIndex + 1) % bannerArtists.length;
                    imgElement.src = bannerArtists[currentIndex].img;
                    nameElement.innerText = bannerArtists[currentIndex].name;
                    imgElement.style.opacity = '1';
                }, 800);
            }
            setInterval(nextSlide, 5000);
        });
    </script>
</body>
</html>
