<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>KARBØN X GAIA ENTERTAINMENT</title>
    <meta name="description" content="KARBØN X GAIA 是一家前瞻性的娛樂公司，致力於創造超越傳統邊界的音樂、藝人和敘事。探索 LILITHIUM、NØVEX、NÄXER 等創新藝人專案。" />
    <meta name="keywords" content="K-POP, 華語流行, 娛樂公司, 音樂製作, 藝人經紀, LILITHIUM, NØVEX, NÄXER, AI音樂, 獨立藝人" />
    <meta name="author" content="KARBØN X GAIA ENTERTAINMENT" />
    
    <meta property="og:title" content="KARBØN X GAIA - K-POP & 華語流行音樂娛樂公司" />
    <meta property="og:description" content="創造超越傳統邊界的音樂、藝人和敘事。探索我們的多元藝術專案。" />
    <meta property="og:type" content="website" />

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', 'Noto Sans TC', sans-serif; }
        #carousel-img { transition: opacity 1.2s ease-in-out; }
        .text-shadow-sm { text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
        .animate-fadeIn { animation: fadeIn 0.6s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-white text-gray-900 overflow-x-hidden">

    <header class="fixed w-full top-0 bg-white/90 backdrop-blur-md z-50 border-b border-gray-100 px-8 py-4 flex justify-between items-center">
        <div class="text-xl font-black tracking-tighter italic">KARBØN X GAIA</div>
        <div class="hidden md:flex gap-8 text-[10px] font-black tracking-widest uppercase text-gray-500">
            <a href="#talents" class="hover:text-black transition">Talents</a>
            <a href="mailto:contact@kayonstudio.com" class="hover:text-black transition">Booking</a>
        </div>
    </header>

    <section class="mt-20 relative w-full h-[80vh] bg-black overflow-hidden flex flex-col items-center justify-end pb-12">
        <div class="absolute inset-0 flex items-start justify-center">
            <img id="carousel-img" 
                 src="images/eunahero-banner.jpg" 
                 class="w-full h-full object-cover object-top opacity-100 z-10" 
                 alt="Artist">
            <div class="absolute inset-x-0 bottom-0 h-40 bg-gradient-to-t from-black/80 to-transparent z-20"></div>
        </div>
        <div class="relative z-30 text-center">
            <h2 id="artist-tag" class="text-white/60 text-[10px] tracking-[0.8em] font-light mb-2 uppercase text-shadow-sm">FEATURED ARTIST</h2>
            <h1 id="artist-name" class="text-white text-3xl md:text-4xl font-bold tracking-[0.2em] uppercase text-shadow-sm">EUNA</h1>
            <div class="w-8 h-[1px] bg-white/40 mx-auto mt-4"></div>
        </div>
    </section>

    <section id="talents" class="max-w-7xl mx-auto px-6 py-24">
        <div class="flex flex-col md:flex-row justify-between items-end mb-16 gap-8">
            <div>
                <h2 class="text-5xl font-black mb-4 tracking-tighter italic text-black">TALENTS & IPs</h2>
                <p class="text-gray-400 font-bold text-xs tracking-widest uppercase">32 Artists • 29 AI / 2 Human / 1 Host • 7 IPs</p>
            </div>

            <div class="flex flex-wrap gap-3">
                <button onclick="filterTalents('all')" class="px-6 py-2 bg-black text-white rounded-full font-bold text-[10px] tracking-widest uppercase">ALL 全部</button>
                <button onclick="filterTalents('AI')" class="px-6 py-2 bg-gray-100 hover:bg-black hover:text-white transition rounded-full font-bold text-[10px] tracking-widest text-gray-500 uppercase transition-all">AI VIRTUAL</button>
                <button onclick="filterTalents('Human')" class="px-6 py-2 bg-gray-100 hover:bg-black hover:text-white transition rounded-full font-bold text-[10px] tracking-widest text-gray-500 uppercase transition-all">HUMAN</button>
            </div>
        </div>

        <div id="talents-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-x-8 gap-y-20">
            </div>
    </section>

    <footer class="bg-gray-50 py-20 border-t border-gray-100 px-6">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-12">
            <div class="text-center md:text-left">
                <h3 class="text-2xl font-black mb-4 tracking-tight italic">WORK WITH US</h3>
                <p class="text-gray-500 text-sm">Manager & Booking: <span class="font-bold text-black uppercase">AVA</span></p>
            </div>
            <a href="mailto:contact@kayonstudio.com" class="bg-black text-white px-12 py-4 font-black text-[10px] tracking-widest hover:scale-105 transition-transform uppercase">
                Contact via Email
            </a>
        </div>
    </footer>

    <script>
        /* --- Banner 輪播邏輯 (原版保留) --- */
        const artists = [
            { name: "EUNA", img: "images/eunahero-banner.jpg" },
            { name: "NØVEX", img: "images/novexhero-banner.jpg" },
            { name: "NÄXER", img: "images/naxerhero-banner.jpg" },
            { name: "JOAH", img: "images/joahhero-banner.jpg" },
            { name: "RAUN", img: "images/raunhero-banner.jpg" },
            { name: "GAIALYRA", img: "images/gaialyrahero-banner.jpg" },
            { name: "VRAISY", img: "images/vraisyhero-banner.jpg" },
            { name: "RÆNE", img: "images/raenehero-banner.jpg" }
        ];
        let currentIndex = 0;
        const imgElement = document.getElementById('carousel-img');
        const nameElement = document.getElementById('artist-name');
        function nextSlide() {
            imgElement.style.opacity = '0';
            setTimeout(() => {
                currentIndex = (currentIndex + 1) % artists.length;
                imgElement.src = artists[currentIndex].img;
                nameElement.innerText = artists[currentIndex].name;
                imgElement.style.opacity = '1';
            }, 1200);
        }
        setInterval(nextSlide, 5000);

        /* --- 藝人資料與渲染邏輯 --- */
        const talentsData = [
            { name: "EUNA", type: "Human", category: "SOLO ARTIST", img: "euna.webp" },
            { name: "JOAH", type: "Human", category: "SOLO ARTIST", img: "joah.webp" },
            { name: "GAIALYRA", type: "AI", category: "EXPERIMENTAL", img: "gaialyra.webp" },
            { name: "RAUN", type: "AI", category: "VIRTUAL IDOL", img: "raun.webp" },
            { name: "NOVEX", type: "AI", category: "ARTIST GROUP", img: "novex.webp" },
            { name: "NAXER", type: "AI", category: "ARTIST GROUP", img: "naxer.webp" },
            { name: "RAENE", type: "AI", category: "VIRTUAL IDOL", img: "raene.webp" },
            { name: "VRAISY", type: "AI", category: "ARTIST GROUP", img: "vraisy.webp" },
            { name: "LUYANGAN", type: "AI", category: "VIRTUAL IDOL", img: "luyangan.webp" },
            // 自動補齊 32 位預約位置
            ...Array.from({ length: 23 }, (_, i) => ({
                name: `IP PROJECT ${i + 10}`,
                type: "AI",
                category: "UPCOMING PROJECT",
                img: "coming-soon.webp"
            }))
        ];

        function renderTalents(filter = 'all') {
            const grid = document.getElementById('talents-grid');
            if(!grid) return;
            grid.innerHTML = '';
            const filtered = filter === 'all' ? talentsData : talentsData.filter(t => t.type === filter);

            filtered.forEach(talent => {
                grid.innerHTML += `
                    <div class="group animate-fadeIn">
                        <div class="aspect-[3/4] rounded-sm bg-gray-100 overflow-hidden mb-6 relative">
                            ${talent.type === 'AI' ? '<span class="absolute top-4 right-4 bg-black text-white text-[8px] font-black px-2 py-1 tracking-widest z-10">AI VIRTUAL</span>' : ''}
                            <img src="images/talents/${talent.img}" 
                                 class="w-full h-full object-cover transition duration-1000 group-hover:scale-105"
                                 onerror="this.src='https://via.placeholder.com/600x800?text=K+X+G+PREVIEW'">
                        </div>
                        <h3 class="text-2xl font-black text-black italic tracking-tighter uppercase">${talent.name}</h3>
                        <p class="text-[10px] font-bold text-gray-400 mt-2 tracking-widest uppercase">${talent.category}</p>
                    </div>
                `;
            });
        }

        function filterTalents(type) {
            renderTalents(type);
        }

        renderTalents();
    </script>
</body>
</html>
