<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>KARBØN X GAIA ENTERTAINMENT</title>
    <meta name="description" content="KARBØN X GAIA 是一家前瞻性的娛樂公司，致力於創造超越傳統邊界的音樂、藝人和敘事。" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', 'Noto Sans TC', sans-serif; background-color: #ffffff; }
        #carousel-img { transition: opacity 1.2s ease-in-out; }
        .text-shadow-sm { text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
        .animate-fadeIn { animation: fadeIn 0.6s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        html { scroll-behavior: smooth; }
        .lang-select { -webkit-appearance: none; -moz-appearance: none; appearance: none; }
    </style>
</head>
<body class="bg-white text-gray-900 overflow-x-hidden">

    <header class="fixed w-full top-0 bg-white/90 backdrop-blur-md z-[100] border-b border-gray-100 px-8 py-5">
        <nav class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="text-xl font-black tracking-tighter italic text-black uppercase">KARBØN X GAIA</div>
            <div class="flex items-center gap-6 md:gap-8 text-[11px] font-bold tracking-widest text-gray-500">
                <a href="#founder" class="hover:text-black transition-colors uppercase">創辦人</a>
                <a href="#talents" class="hover:text-black transition-colors uppercase">藝人</a>
                <a href="#vision" class="hover:text-black transition-colors uppercase">理念</a>
                <a href="#collab" class="hover:text-black transition-colors uppercase">協作</a>
                <a href="#contact" class="hover:text-black transition-colors uppercase">聯絡</a>
                <div class="flex items-center gap-1.5 pl-4 border-l border-gray-200">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9-9c1.657 0 3 4.03 3 9s-1.343 9-3 9m0-18c-1.657 0-3 4.03-3 9s1.343 9 3 9m-9-9a9 9 0 019-9" />
                    </svg>
                    <select class="lang-select bg-transparent border-none text-black font-bold text-[10px] hover:opacity-60 focus:outline-none cursor-pointer">
                        <option value="zh-TW">中文</option>
                        <option value="en">EN</option>
                    </select>
                </div>
            </div>
        </nav>
    </header>

    <section class="mt-20 relative w-full h-[85vh] bg-black overflow-hidden flex flex-col items-center justify-end pb-12">
        <div class="absolute inset-0 flex items-start justify-center">
            <img id="carousel-img" 
                 src="images/luyanganhero-banner.jpg" 
                 class="w-full h-full object-cover object-top opacity-100 z-10" 
                 alt="Artist"
                 onerror="this.src='https://via.placeholder.com/1920x1080?text=BANNER+LOADING...'">
            <div class="absolute inset-x-0 bottom-0 h-64 bg-gradient-to-t from-black to-transparent z-20"></div>
        </div>
        <div class="relative z-30 text-center">
            <h2 id="artist-tag" class="text-white/60 text-[10px] tracking-[0.8em] font-light mb-2 uppercase text-shadow-sm">FEATURED ARTIST</h2>
            <h1 id="artist-name" class="text-white text-4xl md:text-6xl font-black tracking-[0.2em] uppercase text-shadow-sm italic">LUYANGAN</h1>
            <div class="w-12 h-[1px] bg-white/40 mx-auto mt-6"></div>
        </div>
    </section>

    <section id="vision" class="max-w-4xl mx-auto px-6 py-32 text-center">
        <h2 class="text-2xl font-black mb-8 tracking-[0.3em] text-black italic uppercase">Vision / 理念</h2>
        <p class="text-gray-500 leading-relaxed text-sm md:text-lg max-w-2xl mx-auto font-light italic">
            "Merging AI Intelligence with Human Soul to create the future of Entertainment."
        </p>
    </section>

    <section id="talents" class="max-w-7xl mx-auto px-6 py-24 border-t border-gray-50">
        <div class="flex flex-col md:flex-row justify-between items-end mb-16 gap-8">
            <h2 class="text-5xl font-black mb-4 tracking-tighter italic text-black uppercase">Key IPs</h2>
            <div class="flex flex-wrap gap-3">
                <button onclick="filterTalents('all')" class="px-6 py-2 bg-black text-white rounded-full font-bold text-[10px] tracking-widest uppercase">ALL</button>
                <button onclick="filterTalents('AI')" class="px-6 py-2 bg-gray-100 text-gray-500 hover:bg-black hover:text-white rounded-full font-bold text-[10px] tracking-widest uppercase">AI VIRTUAL</button>
                <button onclick="filterTalents('Human')" class="px-6 py-2 bg-gray-100 text-gray-500 hover:bg-black hover:text-white rounded-full font-bold text-[10px] tracking-widest uppercase">HUMAN</button>
            </div>
        </div>
        <div id="talents-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-x-12 gap-y-24"></div>
    </section>

    <script>
        const bannerArtists = [
            { name: "LUYANGAN", img: "images/luyanganhero-banner.jpg" },
            { name: "EUNA", img: "images/eunahero-banner.jpg" },
            { name: "NØVEX", img: "images/novexhero-banner.jpg" },
            { name: "NÄXER", img: "images/naxerhero-banner.jpg" },
            { name: "JOAH", img: "images/joahhero-banner.jpg" },
            { name: "RAUN", img: "images/raunhero-banner.jpg" },
            { name: "GAIALYRA", img: "images/gaialyrahero-banner.jpg" },
            { name: "VRAISY", img: "images/vraisyhero-banner.jpg" },
            { name: "RÆNE", img: "images/raenehero-banner.jpg" }
        ];

        let currentIndex = 0;
        const imgElement = document.getElementById('carousel-img');
        const nameElement = document.getElementById('artist-name');

        // 初始化渲染藝人牆
        const talentsData = [
            { name: "EUNA", type: "Human", category: "SOLO ARTIST", img: "euna.webp" },
            { name: "JOAH", type: "Human", category: "SOLO ARTIST", img: "joah.webp" },
            { name: "LILITHIUM", type: "AI", category: "ARTIST GROUP", img: "lilithium.webp" },
            { name: "NOVEX", type: "AI", category: "ARTIST GROUP", img: "novex.webp" },
            { name: "NAXER", type: "AI", category: "ARTIST GROUP", img: "naxer.webp" },
            { name: "VRAISY", type: "AI", category: "ARTIST GROUP", img: "vraisy.webp" },
            { name: "GAIALYRA", type: "AI", category: "EXPERIMENTAL IP", img: "gaialyra.webp" },
            { name: "RAUN", type: "AI", category: "VIRTUAL IDOL", img: "raun.webp" },
            { name: "RAENE", type: "AI", category: "VIRTUAL IDOL", img: "raene.webp" }
        ];

        function renderTalents(filter = 'all') {
            const grid = document.getElementById('talents-grid');
            if(!grid) return;
            grid.innerHTML = '';
            const filtered = filter === 'all' ? talentsData : talentsData.filter(t => t.type === filter);
            filtered.forEach(talent => {
                grid.innerHTML += `
                    <div class="group animate-fadeIn cursor-pointer">
                        <div class="aspect-[3/4] rounded-sm bg-gray-50 overflow-hidden mb-6 relative border border-gray-100">
                            ${talent.type === 'AI' ? '<span class="absolute top-4 right-4 bg-black text-white text-[8px] font-black px-2 py-1 tracking-widest z-10">AI VIRTUAL</span>' : ''}
                            <img src="images/talents/${talent.img}" class="w-full h-full object-cover transition duration-1000 group-hover:scale-105" onerror="this.src='https://via.placeholder.com/400x500?text=${talent.name}'">
                        </div>
                        <h3 class="text-3xl font-black text-black italic tracking-tighter uppercase">${talent.name}</h3>
                        <p class="text-[10px] font-bold text-gray-400 mt-2 tracking-widest uppercase">${talent.category}</p>
                    </div>`;
            });
        }

        function nextSlide() {
            if (!imgElement) return;
            imgElement.style.opacity = '0';
            setTimeout(() => {
                currentIndex = (currentIndex + 1) % bannerArtists.length;
                imgElement.src = bannerArtists[currentIndex].img;
                nameElement.innerText = bannerArtists[currentIndex].name;
                imgElement.style.opacity = '1';
            }, 1200);
        }

        setInterval(nextSlide, 5000);
        renderTalents();
    </script>
</body>
</html>
