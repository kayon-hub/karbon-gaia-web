<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>KARBØN X GAIA ENTERTAINMENT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', 'Noto Sans TC', sans-serif; background-color: #ffffff; }
        /* 💡 絲滑關鍵：GPU 硬體加速與優化動畫時間 */
        #carousel-img { 
            transition: opacity 1s cubic-bezier(0.4, 0, 0.2, 1); 
            will-change: opacity;
            transform: translateZ(0); /* 強制開啟 GPU 加速 */
        }
        .text-shadow-sm { text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
        .animate-fadeIn { animation: fadeIn 0.6s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        html { scroll-behavior: smooth; }
        .lang-select { -webkit-appearance: none; -moz-appearance: none; appearance: none; }
    </style>
</head>
<body class="bg-white text-gray-900 overflow-x-hidden">

    <header class="fixed w-full top-0 bg-white/90 backdrop-blur-md z-[100] border-b border-gray-100 px-8 py-5">
        <nav class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="text-xl font-black tracking-tighter italic text-black uppercase">KARBØN X GAIA</div>
            <div class="flex items-center gap-6 md:gap-8 text-[11px] font-bold tracking-widest text-gray-500">
                <a href="#founder" class="hover:text-black transition-colors uppercase">創辦人</a>
                <a href="#talents" class="hover:text-black transition-colors uppercase">藝人</a>
                <a href="#vision" class="hover:text-black transition-colors uppercase">理念</a>
                <a href="#collab" class="hover:text-black transition-colors uppercase">協作</a>
                <a href="#contact" class="hover:text-black transition-colors uppercase">聯絡</a>
                <div class="flex items-center gap-1.5 pl-4 border-l border-gray-200">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9-9c1.657 0 3 4.03 3 9s-1.343 9-3 9m0-18c-1.657 0-3 4.03-3 9s1.343 9 3 9m-9-9a9 9 0 019-9" />
                    </svg>
                    <select class="lang-select bg-transparent border-none text-black font-bold text-[10px] hover:opacity-60 focus:outline-none cursor-pointer">
                        <option value="zh-TW">中文</option>
                        <option value="en">EN</option>
                    </select>
                </div>
            </div>
        </nav>
    </header>

    <section class="mt-20 relative w-full h-[85vh] bg-black overflow-hidden flex flex-col items-center justify-end pb-12">
        <div class="absolute inset-0 flex items-start justify-center">
            <img id="carousel-img" 
                 src="images/luyanganhero-banner.jpg" 
                 class="w-full h-full object-cover object-top opacity-100 z-10" 
                 alt="Artist">
            <div class="absolute inset-x-0 bottom-0 h-64 bg-gradient-to-t from-black to-transparent z-20"></div>
        </div>
        <div class="relative z-30 text-center">
            <h2 id="artist-tag" class="text-white/60 text-[10px] tracking-[0.8em] font-light mb-2 uppercase text-shadow-sm">FEATURED ARTIST</h2>
            <h1 id="artist-name" class="text-white text-4xl md:text-6xl font-black tracking-[0.2em] uppercase text-shadow-sm italic">劉揚安</h1>
            <div class="w-12 h-[1px] bg-white/40 mx-auto mt-6"></div>
        </div>
    </section>

    <script>
        const bannerArtists = [
            { name: "劉揚安", img: "images/luyanganhero-banner.jpg" },
            { name: "EUNA", img: "images/eunahero-banner.jpg" },
            { name: "NØVEX", img: "images/novexhero-banner.jpg" },
            { name: "NÄXER", img: "images/naxerhero-banner.jpg" },
            { name: "JOAH", img: "images/joahhero-banner.jpg" },
            { name: "RAUN", img: "images/raunhero-banner.jpg" },
            { name: "GAIALYRA", img: "images/gaialyrahero-banner.jpg" },
            { name: "VRAISY", img: "images/vraisyhero-banner.jpg" },
            { name: "RÆNE", img: "images/raenehero-banner.jpg" }
        ];

        // 💡 圖片預載邏輯：讓輪播不卡頓
        bannerArtists.forEach(artist => {
            const img = new Image();
            img.src = artist.img;
        });

        let currentIndex = 0;
        const imgElement = document.getElementById('carousel-img');
        const nameElement = document.getElementById('artist-name');

        function nextSlide() {
            if (!imgElement) return;
            imgElement.style.opacity = '0'; 
            
            // 等待淡出效果進行到一半再換圖，視覺更順
            setTimeout(() => {
                currentIndex = (currentIndex + 1) % bannerArtists.length;
                imgElement.src = bannerArtists[currentIndex].img;
                nameElement.innerText = bannerArtists[currentIndex].name;
                
                // 確保圖片載入完成再顯示
                imgElement.onload = () => {
                    imgElement.style.opacity = '1';
                };
                
                // 如果圖已經抓過了，onload 可能不會觸發，補一個保險
                if(imgElement.complete) {
                    imgElement.style.opacity = '1';
                }
            }, 800); 
        }

        setInterval(nextSlide, 5000);

        // 藝人牆邏輯... (其餘部分同前)
    </script>
</body>
</html>
